info:
  name: Update a Gmail Label
  type: http
  seq: 3

http:
  method: POST
  url: "{{host}}/update"
  body:
    type: json
    data: |-
      {
        "id": "Label_6",
        "name": "label_test_6_updated",
        "messageListVisibility": "show",
        "labelListVisibility": "labelShow",
        "color": {
          "textColor": "#000000",
          "backgroundColor": "#434343"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
