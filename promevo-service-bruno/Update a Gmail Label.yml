info:
  name: Update a Gmail Label
  type: http
  seq: 3

http:
  method: POST
  url: "{{host}}/update"
  body:
    type: json
    data: |-
      {
        "color": {
          "backgroundColor": "#ffffff",
          "textColor": "#000000"
        },
        "id": "Label_18",
        "labelListVisibility": "labelHide",
        "messageListVisibility": "hide",
        "name": "label_test_18"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
